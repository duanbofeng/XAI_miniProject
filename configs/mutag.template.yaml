# Template for switching the same codebase from AIFB to MUTAG.
# Download MUTAG from https://data.dgl.ai/dataset/rdf/mutag-hetero.zip,
# unzip it into this repository, then replace the TODO values below with
# the exact file names and label columns used by that dataset.
project:
  name: xai26-strategy3-mutag
  seed: 42
  artifacts_dir: artifacts/mutag

dataset:
  name: mutag
  rdf_path: mutag-hetero/TODO.rdf
  rdf_format: xml
  train_path: mutag-hetero/trainingSet.tsv
  test_path: mutag-hetero/testSet.tsv
  all_labels_path: mutag-hetero/completeDataset.tsv
  entity_column: TODO_entity_column
  label_column: TODO_label_column
  target_node_type: TODO_target_node_type_uri
  label_names: {}
  exclude_predicates:
    - TODO_label_leakage_predicate_uri
  include_literal_nodes: false
  add_inverse_edges: true

model:
  name: rgcn
  embedding_dim: 64
  hidden_dim: 64
  dropout: 0.25
  epochs: 250
  learning_rate: 0.01
  weight_decay: 0.0005
  log_every: 25
  device: auto

explanation:
  learner: CELOE
  backend: ontolearn
  fallback_baseline: true
  target_classes: all
  example_source: predictions
  example_split: all
  max_positive_examples: 40
  max_negative_examples: 80
  random_seed: 42
  max_runtime_seconds: 60
  top_k: 3
  ontology_output: artifacts/mutag/mutag_without_labels.owl
  examples_output: artifacts/mutag/learning_problems.json
